function renderTable(dataArray, columns) {
  if(!dataArray || dataArray.length === 0) return `<div style="padding:15px;text-align:center;color:var(--text3);font-size:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);">Sin registros en la nube</div>`;
  
  let rows = dataArray.sort((a,b) => new Date(b.Fecha) - new Date(a.Fecha)).map(row => {
    let tds = columns.map(col => {
      let val = row[col];
      if(col === 'Fecha') val = new Date(val).toLocaleDateString('es-ES');
      return `<td>${escHtml(val)}</td>`;
    }).join('');
    return `<tr>${tds}</tr>`;
  }).join('');

  let headers = columns.map(c => `<th>${c}</th>`).join('');
  return `<div style="border:1px solid var(--border); border-radius:var(--r-md); overflow:hidden; background:var(--surface);"><table class="table-ui"><thead><tr>${headers}</tr></thead><tbody>${rows}</tbody></table></div>`;
}

function stab(i,btn){
  document.querySelectorAll('.tc').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.tbtn').forEach(e=>e.classList.remove('active'));
  document.getElementById('t'+i).classList.add('active');
  btn.classList.add('active');
}

// ══════════════════════════════════════════
// FUNCIÓN ESCRITURA HACIA GOOGLE SHEETS
// ══════════════════════════════════════════
async function saveToCloud(clienteName, tipoId, contId, metaData = {}) {
  const btn = event.target;
  const statusEl = document.getElementById('status_' + contId);
  const tipo = document.getElementById(tipoId).value;
  const contenido = document.getElementById(contId).value;
  
  if(!contenido.trim()){ alert("Escribe un contenido antes de subir."); return; }
  
  btn.innerText = "Enviando..."; btn.style.opacity = "0.6"; btn.disabled = true;
  
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({
        cliente: clienteName,
        tipo: tipo,
        contenido: contenido,
        usuario: "Gestor Dashboard",
        meta: metaData
      })
    });
    
    const json = await res.json();
    if(json.success) {
      statusEl.innerText = "✅ Guardado en Google Sheets. Actualiza la página para ver los cambios.";
      document.getElementById(contId).value = '';
      fetchDataFromCloud(); 
    } else {
      statusEl.innerText = "❌ Error del servidor.";
      statusEl.style.color = "red";
    }
  } catch (error) {
    statusEl.innerText = "❌ Error de red.";
    statusEl.style.color = "red";
    console.error(error);
  }
  
  btn.innerText = "Guardar"; btn.style.opacity = "1"; btn.disabled = false;
  setTimeout(() => { statusEl.innerText = ""; }, 5000);
}
</script>
</body>
</html>
